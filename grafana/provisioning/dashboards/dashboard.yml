# Tells Grafana to auto-load every dashboard JSON file it finds in
# grafana/dashboards/ on startup - the dashboard provisioning equivalent
# of datasources/datasource.yml. Combined, these two files mean a fresh
# Grafana instance pointed at this project's provisioning directory comes
# up with the Prometheus datasource AND the InferBench dashboard already
# in place, with zero manual clicking.

apiVersion: 1

providers:
  - name: InferBench
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # Relative to Grafana's own working directory at launch, NOT to
      # this YAML file's location - grafana.exe must be started with the
      # project root as its working directory for this to resolve
      # correctly (see docs/concepts/05b_phase5_walkthrough.md's "how to
      # run this yourself" section for the exact launch command). Kept
      # relative rather than hardcoding this machine's absolute path, so
      # this config stays portable to any clone of this repo.
      path: grafana/dashboards
