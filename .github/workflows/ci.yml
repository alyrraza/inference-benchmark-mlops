name: CI

# Runs on every push and every pull request against main - installs
# dependencies fresh (like a new contributor cloning this repo would have
# to) and runs the smoke test suite against a real Redis instance, to
# catch "works on my machine" problems before they reach main.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    # Real Redis and PostgreSQL servers, provided by GitHub Actions itself
    # as sibling containers to this job - not mocked, not skipped. This is
    # what makes test_predict_caches_identical_requests and
    # test_predict_logs_to_database actually exercise the real cache-hit
    # and database-logging code paths in CI, not just the happy-path code
    # that never touches either dependency.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inferbench
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # torch/torchvision need the CPU-only wheel index, not regular PyPI -
      # same reasoning as requirements.txt's opening comment.
      - name: Install CPU-only PyTorch
        run: pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision

      - name: Install remaining dependencies
        run: pip install -r requirements.txt

      - name: Run smoke tests
        env:
          # Both service containers above are reachable on localhost from
          # every step in this job - GitHub Actions maps each container's
          # port directly onto the runner's network namespace. Postgres
          # here uses real password auth (unlike this project's local dev
          # cluster, which uses trust auth for zero-friction local setup -
          # see docs/concepts/04_postgres_metadata_store.md for why that
          # distinction matters).
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: inferbench
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: pytest tests/ -v
